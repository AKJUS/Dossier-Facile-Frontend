name: E2E

on:
  schedule:
    - cron: "53 7 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# two runs (ex : triggered by both a merge from backend and frontend ) executing at the same time can cause conflicts
concurrency:
  group: e2e-preprod
  cancel-in-progress: false

jobs:
  tests-on-preprod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies for e2e-tests
        working-directory: e2e-tests
        run: pnpm install

      - name: Run e2e tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: e2e-tests
          install: false
          config-file: cypress-preprod.config.ts
          browser: chrome
          env: configFile=ci
        env:
          CYPRESS_TESTMAIL_API_KEY: ${{ secrets.CYPRESS_TESTMAIL_API_KEY }}
          CYPRESS_TESTMAIL_NAMESPACE: ${{ vars.CYPRESS_TESTMAIL_NAMESPACE }}

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: e2e-tests/cypress/screenshots
          retention-days: 1
      - name: Upload Cypress videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e-tests/cypress/videos/**/*.mp4
          retention-days: 1

      - name: Mattermost alert (failure)
        if: failure()
        shell: bash
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Cypress writes one screenshot per failed test
          screenshots_dir="e2e-tests/cypress/screenshots"
          failed_tests=()
          if [ -d "$screenshots_dir" ]; then
            while IFS= read -r title; do
              [ -n "$title" ] && failed_tests+=("$title")
            done < <(
              find "$screenshots_dir" -type f -name '*(failed)*.png' -printf '%f\n' \
                | sed -E 's/ \(failed\).*//' \
                | sort -u
            )
          fi
          count=${#failed_tests[@]}
          if [ "$count" -eq 0 ]; then
            list="(no failed-test screenshots found — see workflow logs)"
            label="e2e job"
          else
            list=$(printf -- "- %s\n" "${failed_tests[@]}")
            label="$count test(s)"
          fi
          text="[dossierfacile-preprod] $label failed:
          $list
          [Failed workflow]($RUN_URL)"
          jq -n --arg t "$text" '{attachments:[{text:$t,color:"#FF8000",fallback:"e2e failed"}]}' | \
            curl -sS -X POST -H "Content-Type: application/json" --data @- "$MATTERMOST_WEBHOOK_URL"

      - name: Mattermost alert (success)
        if: success()
        shell: bash
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          text="[dossierfacile-preprod] ✅ Suite e2e preprod OK
          [Workflow]($RUN_URL)"
          jq -n --arg t "$text" '{attachments:[{text:$t,color:"#3DAA35",fallback:"e2e passed"}]}' | \
            curl -sS -X POST -H "Content-Type: application/json" --data @- "$MATTERMOST_WEBHOOK_URL"
