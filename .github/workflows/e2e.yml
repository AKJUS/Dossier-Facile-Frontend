name: E2E

on:
  schedule:
    - cron: "53 7 * * *"
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Tests share a single preprod account (mario): 
# two runs executing at the same time can cause conflicts 
concurrency:
  group: e2e-preprod
  cancel-in-progress: false

jobs:
  tests-on-preprod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies for e2e-tests
        working-directory: e2e-tests
        run: pnpm install

      - name: Run e2e tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: e2e-tests
          install: false
          config-file: cypress-preprod.config.ts
          browser: chrome
          env: configFile=ci
        env:
          CYPRESS_TESTMAIL_API_KEY: ${{ secrets.CYPRESS_TESTMAIL_API_KEY }}
          CYPRESS_TESTMAIL_NAMESPACE: ${{ vars.CYPRESS_TESTMAIL_NAMESPACE }}
      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: e2e-tests/cypress/screenshots
          retention-days: 1
      - name: Upload Cypress videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: e2e-tests/cypress/videos/**/*.mp4
          retention-days: 1
      - name: Mattermost alert
        if: failure()
        shell: bash
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Cypress creates one subdir under cypress/screenshots per spec that has at least one failed test
          failed_specs=()
          screenshots_dir="e2e-tests/cypress/screenshots"
          if [ -d "$screenshots_dir" ]; then
            while IFS= read -r dir; do
              failed_specs+=("$(basename "$dir" .cy.ts)")
            done < <(find "$screenshots_dir" -mindepth 1 -maxdepth 1 -type d | sort)
          fi
          count=${#failed_specs[@]}
          if [ "$count" -eq 0 ]; then
            spec_list="(no spec dirs found — see workflow logs)"
            count_label="e2e job"
          else
            spec_list=$(printf -- "- %s\n" "${failed_specs[@]}")
            count_label="$count spec(s)"
          fi
          text="[dossierfacile-preprod] $count_label failed:
          $spec_list
          [Failed workflow]($RUN_URL)"
          jq -n --arg t "$text" '{attachments:[{text:$t,color:"#FF8000",fallback:"e2e failed"}]}' | \
            curl -sS -X POST -H "Content-Type: application/json" --data @- "$MATTERMOST_WEBHOOK_URL"
